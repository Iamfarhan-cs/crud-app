services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crud_db
      POSTGRES_USER: crud_user
      POSTGRES_PASSWORD: crud_password
    ports:
      - "5432:5432"
    volumes:
      - crud_postgres_data:/var/lib/postgresql/data
      - ./migrations/001_create_tasks_table.up.sql:/docker-entrypoint-initdb.d/001_create_tasks_table.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crud_user -d crud_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://crud_user:crud_password@postgres:5432/crud_db?sslmode=disable"
      READ_TIMEOUT: "5s"
      WRITE_TIMEOUT: "10s"
      IDLE_TIMEOUT: "60s"
      SHUTDOWN_TIMEOUT: "10s"
      DB_MAX_OPEN_CONNECTIONS: "10"
      DB_MAX_IDLE_CONNECTIONS: "5"
      DB_CONNECTION_MAX_LIFE: "30m"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  crud_postgres_data:
